# Inventory of target hosts for Ansible deployment.
# Replace the IP with your actual server (VM, cloud instance, etc.)
# For a real deploy, point this at an Ubuntu host you can SSH into.

[cifar_servers]
cifar-host ansible_host=192.168.64.10 ansible_user=ubuntu

# Example for a cloud server:
# cifar-host ansible_host=YOUR_SERVER_IP ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa